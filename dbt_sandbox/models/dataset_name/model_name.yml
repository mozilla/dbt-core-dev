# Example schema
version: 2
models:
  - name: model_name
    description: >
      'add a model description'
    columns:
      - name: submission_date
        description: '{{ var("submission_date")}}' # defined in dbt_project.yaml
        data_type: TIMESTAMP
        tests:
          - not_null
      - name: tile_id
        description: 'A unique identifier used to identify content on Newtab (also used as an ad ID)'
        data_type: INTEGER
      - name: impressions
        description: 'A sum of impressions by tile_id'
        date_type: INTEGER
      - name: clicks
        description: 'A sum of clicks by tile_id'
        data_type: INTEGER
